<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Skillshare — Katya Mukha</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preload" href="assets/fonts/CoFoSans-Regular-Trial.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="assets/fonts/CoFoSans-Thin-Trial.woff2" as="font" type="font/woff2" crossorigin />
  <style>
    @font-face {
      font-family: "CoFo Sans";
      src:
        url("assets/fonts/CoFoSans-Thin-Trial.woff2") format("woff2"),
        url("assets/fonts/CoFoSansPro-Thin-Trial.woff") format("woff");
      font-weight: 100;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "CoFo Sans";
      src:
        url("assets/fonts/CoFoSans-Regular-Trial.woff2") format("woff2"),
        url("assets/fonts/CoFoSansPro-Regular-Trial.woff") format("woff");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --bg: #f4f4f4;
      --blue: #111111;
      --page-x: 24px;
      --font-main: "CoFo Sans", Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--blue);
      font-family: var(--font-main);
      font-synthesis: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100svh;
      background: var(--bg);
    }

    .page > .contacts-section {
      position: relative;
      min-height: 83.333svh;
      padding: 8px var(--page-x) 40px;
      background: var(--bg);
      color: var(--blue);
    }

    .page .contacts__title {
      margin: 0;
      font-family: var(--font-main);
      font-size: 56px;
      line-height: 0.95;
      font-weight: 200;
      letter-spacing: 0;
    }

    .page .contacts__intro {
      max-width: 300px;
      margin: 12px 0 0;
      font-family: var(--font-main);
      font-size: 16px;
      line-height: 1.5;
      font-weight: 400;
    }

    .page .contacts__details {
      position: absolute;
      left: var(--page-x);
      right: var(--page-x);
      bottom: 274px;
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      column-gap: 40px;
      row-gap: 28px;
      margin-top: 0;
    }

    .page .contacts__item {
      margin: 0;
    }

    .page .contacts__item--email {
      grid-column: 4 / span 5;
      grid-row: 1;
      transform: translateY(40px);
    }

    .page .contacts__item--tel {
      grid-column: 8 / -1;
      grid-row: 1;
      transform: translateY(40px);
    }

    .page .contacts__item--cv {
      grid-column: 4 / span 4;
      transform: translateY(44px);
    }

    .page .contacts__actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
    }

    .page .contacts__label {
      display: block;
      margin-bottom: 12px;
      font-family: var(--font-main);
      font-size: 16px;
      line-height: 1;
      font-weight: 400;
    }

    .page .contacts__value {
      position: relative;
      display: inline-block;
      font-family: var(--font-main);
      font-size: 30px;
      line-height: 1;
      font-weight: 400;
      color: inherit;
      text-decoration: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
      transform-origin: center center;
    }

    .page .contacts__item--email .contacts__value,
    .page .contacts__item--tel .contacts__value {
      top: -8px;
      font-size: 24px;
      font-weight: 100;
      white-space: nowrap;
    }

    .page .contacts__value:hover {
      opacity: 0.72;
      transform: scale(0.98);
    }

    .page .contacts__cv-button,
    .page .contacts__telegram-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: auto;
      height: 52px;
      padding: 0 20px 2px;
      border: 0;
      border-radius: 999px;
      outline: 0;
      box-shadow: none;
      font-family: var(--font-main);
      font-size: 17px;
      line-height: 1;
      font-weight: 400;
      text-decoration: none;
      transform-origin: center center;
      transition: background-color 0.2s ease, color 0.2s ease, transform 0.2s ease;
      will-change: transform;
    }

    .page .contacts__cv-button {
      background: #02BE74;
      color: #fff;
    }

    .page .contacts__telegram-button {
      background: #E5E6EB;
      color: var(--blue);
    }

    .page .contacts__telegram-button::after {
      content: "→";
      font-size: 0.94em;
      line-height: 1;
      transform: translateY(1px);
    }

    .page .contacts__cv-button:hover,
    .page .contacts__telegram-button:hover {
      transform: scale(0.98);
    }

    .page .contacts__year {
      position: absolute;
      left: var(--page-x);
      bottom: 20px;
      font-family: var(--font-main);
      font-size: 16px;
      line-height: 1.2;
      font-weight: 400;
    }

    @media (min-width: 901px) and (max-width: 1180px) {
      .page .contacts__title {
        font-size: 48px;
      }
    }

    @media (min-width: 481px) and (max-width: 900px) {
      .page .contacts__title {
        font-size: 44px;
      }
    }

    @media (max-width: 480px) {
      .page > .contacts-section {
        --mobile-main-line-height: 20px;
        --mobile-heading-1-size: 42px;
        --mobile-heading-1-line-height: 0.95;
        min-height: auto;
        padding: 8px 12px var(--mobile-main-line-height);
      }

      .page .contacts__title {
        font-size: var(--mobile-heading-1-size);
        line-height: var(--mobile-heading-1-line-height);
      }

      .page .contacts__intro {
        max-width: none;
        margin-top: var(--mobile-main-line-height);
        font-size: 16px;
        line-height: var(--mobile-main-line-height);
      }

      .page .contacts__details {
        position: static;
        display: grid;
        grid-template-columns: 1fr;
        row-gap: var(--mobile-main-line-height);
        margin-top: 40px;
      }

      .page .contacts__item--email,
      .page .contacts__item--tel,
      .page .contacts__item--cv {
        grid-column: auto;
        transform: none;
      }

      .page .contacts__actions {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-top: 20px;
      }

      .page .contacts__cv-button,
      .page .contacts__telegram-button {
        height: 56px;
      }

      .page .contacts__year {
        position: static;
        margin-top: 40px;
      }
    }

    @media (max-width: 279.98px) {
      .page .contacts__details {
        row-gap: var(--mobile-main-line-height);
      }

      .page .contacts__item--email,
      .page .contacts__item--tel,
      .page .contacts__item--cv {
        grid-row: auto;
      }

      .page .contacts__item--tel {
        margin-top: calc(42px - var(--mobile-main-line-height));
      }

      .page .contacts__item--email .contacts__value,
      .page .contacts__item--tel .contacts__value {
        font-size: 16px;
        line-height: var(--mobile-main-line-height);
      }

      .page .contacts__intro,
      .page .contacts__label,
      .page .contacts__year {
        line-height: var(--mobile-main-line-height);
      }

      .page .contacts__actions {
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        gap: 8px;
      }
    }

    @media (min-width: 280px) and (max-width: 900px) {
      .page .contacts__details {
        grid-template-columns: 1fr;
        row-gap: 40px;
      }

      .page .contacts__item--email,
      .page .contacts__item--tel,
      .page .contacts__item--cv {
        grid-column: 1 / -1;
        grid-row: auto;
        transform: none;
      }

      .page .contacts__item--email .contacts__value,
      .page .contacts__item--tel .contacts__value {
        font-size: 24px;
        line-height: 1;
        font-weight: 100;
      }

      .page .contacts__label {
        margin-bottom: 12px;
        font-size: 16px;
        line-height: 1;
        font-weight: 400;
      }
    }

    @media (min-width: 480px) and (max-width: 900px) {
      .page > .contacts-section {
        --mobile-main-line-height: 20px;
        min-height: auto;
        padding-top: 8px;
        padding-bottom: var(--mobile-main-line-height);
      }

      .page .contacts__intro {
        max-width: none;
        margin-top: var(--mobile-main-line-height);
        font-size: 16px;
        line-height: var(--mobile-main-line-height);
      }

      .page .contacts__details {
        position: static;
        display: grid;
        grid-template-columns: 1fr;
        row-gap: 40px;
        margin-top: 40px;
      }

      .page .contacts__actions {
        display: flex;
        gap: 8px;
        justify-content: flex-start;
        margin-top: 20px;
      }

      .page .contacts__cv-button,
      .page .contacts__telegram-button {
        height: 56px;
      }

      .page .contacts__year {
        position: static;
        margin-top: 40px;
      }
    }

    @media (max-width: 900px) {
      .page .contacts__actions {
        align-items: flex-start;
        justify-content: flex-start;
      }
    }

    @media (min-width: 901px) {
      .page > .contacts-section {
        min-height: 580px;
        height: 580px;
      }
    }

    .page .contacts__item--email .contacts__value,
    .page .contacts__item--tel .contacts__value {
      font-weight: 400;
    }

    /* Final shared case refinements */
    :root {
      --bg: #f4f4f4;
    }

    .page > .contacts-section::before {
      content: "";
      position: absolute;
      top: 0;
      left: var(--page-x);
      right: var(--page-x);
      height: 1px;
      background: #E5E6EB;
    }

    .page .contacts__item--email {
      grid-column: 5 / span 5;
      transform: translateY(20px);
    }

    .page .contacts__item--cv {
      grid-column: 5 / span 4;
      transform: translateY(24px);
    }

    .page .contacts__year {
      bottom: 70px;
    }

    @media (max-width: 900px) {
      .page .contacts__item--email,
      .page .contacts__item--cv {
        grid-column: 1 / -1;
        transform: none;
      }

      .page .contacts__year {
        bottom: auto;
      }
    }

    /* Final footer layout from reference */
    .page .contacts__item--tel {
      display: none;
    }

    .page > .contacts-section {
      background: #fff;
      color: var(--blue);
    }

    .page .contacts__tagline {
      display: none;
      font-family: var(--font-main);
    }

    .page .contacts__title,
    .page .contacts__intro,
    .page .contacts__label,
    .page .contacts__value,
    .page .contacts__year,
    .page .contacts__tagline,
    .page .contacts__telegram-button,
    .page .contacts__telegram-button:hover {
      color: var(--blue);
    }

    .page .contacts__item--email .contacts__value {
      top: 0;
      left: 0;
    }

    .page .contacts__item--email .contacts__label {
      position: relative;
      top: 4px;
      left: 1px;
      font-size: 18px;
    }

    @media (min-width: 901px) {
      .page > .contacts-section {
        height: 494px;
        min-height: 494px;
        padding-top: 20px;
        padding-bottom: 16px;
      }

      .page > .contacts-section::before {
        content: none;
        display: none;
      }

      .page .contacts__title {
        font-size: 52px;
        line-height: 56px;
        font-weight: 200;
      }

      .page .contacts__intro {
        max-width: 340px;
        margin-top: 12px;
        font-size: 16px;
        line-height: 20px;
        font-weight: 400;
        color: var(--blue);
      }

      .page .contacts__details {
        position: static;
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        column-gap: 20px;
        row-gap: 32px;
        margin-top: 24px;
      }

      .page .contacts__item--email,
      .page .contacts__item--cv {
        grid-column: 4 / -1;
        grid-row: auto;
        transform: none;
      }

      .page .contacts__label {
        margin-bottom: 0;
        font-size: 18px;
        line-height: 28px;
        font-weight: 400;
        color: var(--blue);
      }

      .page .contacts__item--email .contacts__value {
        font-size: 44px;
        line-height: 56px;
        font-weight: 100;
        color: var(--blue);
      }

      .page .contacts__actions {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 8px;
        margin-top: 0;
      }

      .page .contacts__cv-button,
      .page .contacts__telegram-button {
        height: 52px;
        padding: 0 20px 2px;
        border-radius: 999px;
        font-size: 17px;
        line-height: 1;
        font-weight: 400;
      }

      .page .contacts__cv-button {
        background: #02BE74;
        color: #fff;
      }

      .page .contacts__telegram-button {
        background: #E5E6EB;
        color: var(--blue);
      }

      .page .contacts__year,
      .page .contacts__tagline {
        display: block;
        position: absolute;
        bottom: 16px;
        font-family: var(--font-main);
        font-size: 16px;
        line-height: 20px;
        font-weight: 400;
        color: var(--blue);
      }

      .page .contacts__year {
        left: var(--page-x);
      }

      .page .contacts__tagline {
        right: var(--page-x);
        text-align: right;
      }
    }

    @media (max-width: 799px) {
      .page .contacts__item--email,
      .page .contacts__item--cv {
        grid-column: 1 / -1;
      }

      .page .contacts__item--email .contacts__value {
        font-size: 44px;
      }
    }

    @media (max-width: 449px) {
      .page .contacts__item--email .contacts__value {
        font-size: 32px;
      }
    }

    html body * {
      font-weight: 400 !important;
    }

    html body :is(
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      .contacts__title
    ),
    html body :is(
      h1,
      h2,
      h3,
      h4,
      h5,
      h6,
      .contacts__title
    ) * {
      font-weight: 100 !important;
    }
  </style>
</head>
<body>
  <main class="page">
    <footer id="screen-contacts" class="contacts-section" aria-labelledby="contacts-title">
      <h2 class="contacts__title" id="contacts-title">контакты</h2>
      <p class="contacts__intro">
        Открыта к сотрудничеству<br />в Москве или удалённо
      </p>

      <div class="contacts__details" aria-label="Контактная информация">
        <p class="contacts__item contacts__item--email">
          <span class="contacts__label">Email</span>
          <a class="contacts__value" href="mailto:katya@mukha.design" title="Написать на email">katya@mukha.design</a>
        </p>

        <p class="contacts__item contacts__item--tel">
          <span class="contacts__label">Tel</span>
          <a class="contacts__value" href="tel:+79852399132" title="Позвонить">+7 (985) 239 91 32</a>
        </p>

        <nav class="contacts__item contacts__item--cv contacts__actions" aria-label="Контакты и резюме">
          <a class="cv-button contacts__cv-button" href="assets/files/katya-mukha-cv.pdf" download title="Скачать CV">Скачать&nbsp;CV</a>
          <a class="telegram-link contacts__telegram-button" href="https://t.me/katyamukha" target="_blank" rel="noopener noreferrer">Telegram</a>
        </nav>
      </div>

      <div class="contacts__year">© 2026 Катя Мукха. Все права защищены.</div>
      <div class="contacts__tagline">Lets design!</div>
    </footer>
  </main>
</body>
</html>
