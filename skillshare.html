    @font-face {
      font-family: "CoFo Sans";

      font-style: normal;
      font-display: swap;

    :root {
      --bg: #f4f4f4;
      --blue: #111111;
      --page-x: 24px;
      --font-main: "CoFo Sans", Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--blue);
      font-family: var(--font-main);
      font-synthesis: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: geometricPrecision;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .custom-cursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 20px;
      height: 20px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #4267ff;
      border: 0;
      border-radius: 50%;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -50%);
      z-index: 10001;
      overflow: hidden;
      white-space: nowrap;
      transition: opacity 0.15s ease, transform 0.15s ease, width 0.18s ease, height 0.18s ease, background-color 0.18s ease;
    }

    .custom-cursor.is-visible {
      opacity: 1;
    }

    .custom-cursor.is-on-section-link {
      width: 24px;
      height: 24px;
      opacity: 0.5;
    }

    .custom-cursor.is-on-light-control {
      background: #fff;
    }

    .cursor-text-mask {
      position: fixed;
      inset: 0;
      z-index: 10000;
      pointer-events: none;
      color: #fff;
      opacity: 0;
      clip-path: circle(10px at var(--cursor-x, -100px) var(--cursor-y, -100px));
      transition: opacity 0.15s ease;
    }

    .cursor-text-mask.is-visible {
      opacity: 1;
    }

    .cursor-text-mask.is-on-section-link {
      clip-path: circle(12px at var(--cursor-x, -100px) var(--cursor-y, -100px));
    }

    .cursor-text-mask * {
      color: #fff !important;
      border-color: #fff !important;
      text-decoration-color: #fff !important;
      box-shadow: none !important;
    }

    .cursor-text-mask.is-on-light-control * {
      color: #4267ff !important;
      border-color: #4267ff !important;
      text-decoration-color: #4267ff !important;
    }

    .cursor-text-mask,
    .cursor-text-mask *,
    .cursor-text-mask .page,
    .cursor-text-mask .contacts-section {
      background: transparent !important;
      background-color: transparent !important;
      background-image: none !important;
    }

    .cursor-text-mask img,
    .cursor-text-mask video,
    .cursor-text-mask picture {
      visibility: hidden !important;
    }

    .cursor-text-mask .custom-cursor,
    .cursor-text-mask .cursor-text-mask {
      visibility: hidden !important;
    }

    @media (pointer: fine) {
      html,
      body,
      a,
      button {
        cursor: none;
      }
    }

    @media (pointer: coarse) {
      .custom-cursor,
      .cursor-text-mask {
        display: none;
      }
    }

    .page {
      min-height: 100svh;
      background: var(--bg);
    }

    .page > .contacts-section {
      position: relative;
      min-height: 83.333svh;
      padding: 8px var(--page-x) 40px;
      background: var(--bg);
      color: var(--blue);
    }

    .page .contacts__title {

      font-family: var(--font-main);
      font-size: 56px;
      line-height: 0.95;
      font-weight: 200;
      letter-spacing: 0;

    .page .contacts__intro {
      max-width: 300px;
      margin: 12px 0 0;
      font-family: var(--font-main);
      font-size: 16px;
      line-height: 1.5;
      font-weight: 400;

    .page .contacts__details {
      position: absolute;
      left: var(--page-x);
      right: var(--page-x);
      bottom: 274px;
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      column-gap: 40px;
      row-gap: 28px;
      margin-top: 0;
    }

    .page .contacts__item {
      margin: 0;
    }

    .page .contacts__item--email {
      grid-column: 4 / span 5;
      grid-row: 1;
      transform: translateY(40px);
    }

    .page .contacts__item--tel {
      grid-column: 8 / -1;
      grid-row: 1;
      transform: translateY(40px);
    }

    .page .contacts__item--cv {
      grid-column: 4 / span 4;
      transform: translateY(44px);
    }

    .page .contacts__actions {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
    }

    .page .contacts__label {
      display: block;
      margin-bottom: 12px;
      font-family: var(--font-main);
      font-size: 16px;
      line-height: 1;
      font-weight: 400;

    .page .contacts__value {

      font-family: var(--font-main);
      font-size: 30px;
      line-height: 1;
      font-weight: 400;

    .page .contacts__item--tel .contacts__value {

      font-size: 24px;
      font-weight: 100;
      white-space: nowrap;
    }

    .page .contacts__value:hover {

      transform: scale(0.98);

      justify-content: center;

  </main>
  <script>
    (() => {
      const customCursor = document.querySelector('.custom-cursor');
      const cursorTextMask = document.querySelector('.cursor-text-mask');
      const page = document.querySelector('.page');

      if (!customCursor || !cursorTextMask || !page || !window.matchMedia('(pointer: fine)').matches) return;

      const pageClone = page.cloneNode(true);

      pageClone.querySelectorAll('img, source, video').forEach((asset) => {
        asset.setAttribute('aria-hidden', 'true');
      });

      cursorTextMask.appendChild(pageClone);

      const syncCursorTextMask = () => {
        pageClone.className = page.className;
      };

      const syncMaskScroll = () => {
        pageClone.style.transform = `translateY(${-window.scrollY}px)`;
        syncCursorTextMask();
      };

      document.addEventListener('pointermove', (event) => {
        customCursor.style.left = `${event.clientX}px`;
        customCursor.style.top = `${event.clientY}px`;
        customCursor.classList.add('is-visible');

        const elementUnderCursor = document.elementFromPoint(event.clientX, event.clientY);
        const isOnLightControl = elementUnderCursor && elementUnderCursor.closest('.cv-button, .telegram-link');

        customCursor.classList.toggle('is-on-light-control', Boolean(isOnLightControl));
        cursorTextMask.classList.toggle('is-on-light-control', Boolean(isOnLightControl));
        cursorTextMask.style.setProperty('--cursor-x', `${event.clientX}px`);
        cursorTextMask.style.setProperty('--cursor-y', `${event.clientY}px`);
        cursorTextMask.classList.add('is-visible');
        syncMaskScroll();
      });

      document.addEventListener('pointerleave', () => {
        customCursor.classList.remove('is-visible', 'is-on-light-control');
        cursorTextMask.classList.remove('is-visible', 'is-on-light-control');
      });

      window.addEventListener('scroll', syncMaskScroll, { passive: true });
      window.addEventListener('resize', syncMaskScroll);
      syncMaskScroll();
    })();
  </script>
</body>
</html>
